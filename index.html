<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>FlashFeed</title>
    <meta name="description" content="CRM Made By Argho" />
    <meta name="author" content="Argho" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="FlashFeed" />
    <meta property="og:description" content="CRM Made By Argho" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlashFeed" />
    <meta name="twitter:description" content="CRM Made By Argho" />
    <meta name="twitter:image" content="/logo.svg" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme');
          const supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches === true;
          if (theme === 'dark' || (!theme && supportDarkMode)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
